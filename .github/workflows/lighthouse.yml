name: Lighthouse CI

on:
  push:
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      LH_WAIT_TIMEOUT_MS: "60000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build site-demo
        run: npm run build --workspace @ecom/site-demo

      - name: Start site-demo
        run: |
          npm run start --workspace @ecom/site-demo > /tmp/site-demo.log 2>&1 &
          server_pid=$!
          if ! ps -p "$server_pid" > /dev/null; then
            echo "site-demo failed to start"
            cat /tmp/site-demo.log || true
            exit 1
          fi
          echo "$server_pid" > /tmp/site-demo.pid

      - name: Wait for site-demo
        run: npx wait-on --timeout $LH_WAIT_TIMEOUT_MS http://127.0.0.1:3000

      - name: Run Lighthouse assertions
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./apps/site-demo/.lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Stop site-demo
        if: always()
        run: |
          if [ -f /tmp/site-demo.pid ]; then
            server_pid=$(cat /tmp/site-demo.pid)
            kill -TERM "$server_pid" || echo "Server PID $server_pid already stopped"
            pkill -TERM -P "$server_pid" || echo "No child processes found for PID $server_pid"
          fi

      - name: Show site-demo logs
        if: always()
        run: cat /tmp/site-demo.log || true
